  <circle cx="100" cy="100" r="80" stroke="url(#grad2)" stroke-width="4" fill="none"/>
  <circle cx="100" cy="100" r="60" stroke="url(#grad2)" stroke-width="3" fill="none"/>
  
  <!-- Small dots -->
  <circle cx="30" cy="50" r="8" fill="url(#grad2)"/>
  <circle cx="170" cy="150" r="10" fill="url(#grad2)"/>
  <circle cx="180" cy="40" r="6" fill="url(#grad2)"/>
